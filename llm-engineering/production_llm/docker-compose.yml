version: '3.8'

services:
  api:
    build: .
    image: production-llm-api:latest
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./data:/app/data
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,https://yourdomain.com
      - ENV=development
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_PATH=/app/data/production_llm.db
      - CHROMA_DB_PATH=/app/data/chroma_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=production-llm
      - ENABLE_JSON_LOGGING=true
      - ENABLE_CONSOLE_TRACES=false
    restart: unless-stopped
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "127.0.0.1:16687:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
