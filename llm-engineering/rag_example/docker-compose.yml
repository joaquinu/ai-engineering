services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 5s
      retries: 10

  rag-api:
    build:
      context: ../rag
      dockerfile: ../rag_example/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override POSTGRES_HOST to use service name (not localhost)
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
